
<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO -->
    <title>Solar Gear Ltd | Premium Residential Solar Installers Kenya</title>
    <meta name="description" content="Nationwide residential solar engineering in Kenya. Stop KPLC blackouts with Tier-1 hybrid solar backup systems. Get a free readiness assessment today.">
    <meta name="keywords" content="Solar panels Kenya, Solar installers Nairobi, Residential solar backup Kenya, Solar Gear Ltd, Best solar company Kenya, Hybrid solar systems Nairobi">
    <link rel="canonical" href="https://solargear.co.ke/" />

    <!-- Performance Optimization: Preconnects -->
    <link rel="preconnect" href="https://esm.sh" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS for Hero - Inline for Speed -->
    <style>
      body { margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
      #root { min-height: 100vh; }
      .initial-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1A1A1A; color: white; gap: 1rem; }
      .loading-spinner { border: 2px solid #333; border-bottom-color: #D4AF37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .retry-btn { display: none; padding: 8px 16px; background: #D4AF37; color: #1A1A1A; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>

    <script>
      // Early boot error tracking
      window.onerror = function(msg, url, line, col, error) {
        console.error('Boot error:', msg, 'at', url, ':', line);
        const loadingEl = document.querySelector('.initial-loading');
        if (loadingEl) {
          loadingEl.innerHTML = `
            <div style="color: #D4AF37; font-weight: bold; margin-bottom: 10px;">Failed to load application</div>
            <div style="font-size: 10px; color: #666; max-width: 200px; text-align: center; margin-bottom: 20px;">${msg}</div>
            <button onclick="window.location.reload()" style="padding: 8px 16px; background: #D4AF37; color: #1A1A1A; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">RETRY</button>
          `;
        }
        return false;
      };

      // Show retry button after 10 seconds if still loading
      setTimeout(() => {
        const retryBtn = document.querySelector('.retry-btn');
        if (retryBtn && document.querySelector('.initial-loading')) {
          retryBtn.style.display = 'block';
        }
      }, 10000);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              charcoal: '#1A1A1A',
              gold: {
                DEFAULT: '#D4AF37',
                light: '#E5C565',
                dark: '#B59020',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              spotlight: "spotlight 2s ease .75s 1 forwards",
              'spin-slow': 'spin 8s linear infinite',
            },
            keyframes: {
              spotlight: {
                "0%": { opacity: 0, transform: "translate(-72%, -62%) scale(0.5)" },
                "100%": { opacity: 1, transform: "translate(-50%,-40%) scale(1)" },
              },
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "vite": "https://esm.sh/vite@^7.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "@splinetool/react-spline": "https://esm.sh/@splinetool/react-spline@^4.1.0"
  }
}
</script>
</head>
  <body>

    <div id="root">
      <div class="initial-loading">
        <div class="loading-spinner"></div>
        <div style="font-size: 10px; color: #666; letter-spacing: 0.2em; text-transform: uppercase;">Initializing Solar Hub</div>
        <button class="retry-btn" onclick="window.location.reload()">RETRY</button>
      </div>
    </div>
    <script type="module" src="/index.tsx" defer></script>
  </body>
</html>
